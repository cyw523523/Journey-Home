server:
  port: 8080

spring:
  application:
    name: guitu-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:guitu}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

app:
  upload:
    dir: ${user.dir}/uploads
    public-path: /uploads
  security:
    token-secret: change-this-secret-before-deploying-guitu
    token-ttl-hours: 168
  admin:
    bootstrap-enabled: true
    account: admin
    password: Admin123456
    phone: 19900000000
    nickname: 系统管理员
