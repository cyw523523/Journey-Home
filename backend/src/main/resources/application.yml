server:
  port: 8080

spring:
  application:
    name: guitu-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:guitu}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: root
    password: 522370
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

app:
  upload:
    dir: ${user.dir}/uploads
    public-path: /uploads
  ai:
    zhipu:
      api-url: ${ZHIPU_API_URL:https://open.bigmodel.cn/api/paas/v4/chat/completions}
      api-key: ${ZHIPU_API_KEY:}
      model: ${ZHIPU_AI_MODEL:glm-4-flash-250414}
      connect-timeout-ms: ${ZHIPU_CONNECT_TIMEOUT_MS:10000}
      read-timeout-ms: ${ZHIPU_READ_TIMEOUT_MS:60000}
  security:
    token-secret: change-this-secret-before-deploying-guitu
    token-ttl-hours: 168
  admin:
    bootstrap-enabled: true
    account: admin
    password: Admin123456
    phone: 19900000000
    nickname: 系统管理员
